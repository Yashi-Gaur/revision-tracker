<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Yashi Gaur's SWE Revision Tracker — DSA, Frontend, Backend, System Design">
<title>Yashi's SWE Revision Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <h1>📚 Yashi's Revision Tracker <span class="viewing-badge" id="viewingBadge" style="display:none">Viewing Snapshot</span></h1>
    <div class="header-actions">
      <span class="sync-indicator" id="syncIndicator"><span class="dot"></span><span id="syncText">Loading…</span></span>
      <button class="btn btn-icon" id="themeBtn" title="Toggle theme">🌙</button>
      <button class="btn" id="shareBtn" title="Share progress with friends">🔗 Share</button>
      <button class="btn" id="resetBtn" title="Reset all progress">↺ Reset</button>
    </div>
  </div>
</header>

<main class="container">
  <div class="progress-row">
    <div class="overall-card">
      <h2>Overall Progress</h2>
      <div class="overall-stats">
        <div class="big" id="overallPct">0%</div>
        <div class="sub" id="overallText">0 of 0 subtopics complete</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="overallBar" style="width:0%"></div>
      </div>
      <div class="overall-sections" id="overallSections"></div>
    </div>

    <div class="calendar-card">
      <div class="cal-nav-row">
        <button class="btn btn-icon" id="calPrev" title="Previous month">‹</button>
        <span class="cal-month-year" id="calMonthYear"></span>
        <button class="btn btn-icon" id="calNext" title="Next month">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-legend">
        <span class="cal-legend-item"><span class="cal-dot cal-dot-dsa"></span>DSA</span>
        <span class="cal-legend-item"><span class="cal-dot cal-dot-frontend"></span>Frontend</span>
        <span class="cal-legend-item"><span class="cal-dot cal-dot-backend"></span>Backend</span>
        <span class="cal-legend-item"><span class="cal-dot cal-dot-lld"></span>LLD</span>
        <span class="cal-legend-item"><span class="cal-dot cal-dot-systemDesign"></span>System</span>
      </div>
    </div>
  </div>

  <div id="sections"></div>
</main>

<div class="modal-backdrop" id="shareModal">
  <div class="modal">
    <h3>🔗 Share your progress</h3>
    <p>Copy this URL and send it to your friends. They'll see your current progress as a read-only snapshot.</p>
    <textarea class="modal-share-url" id="shareUrl" readonly></textarea>
    <div class="modal-actions">
      <button class="btn" id="closeShareModal">Close</button>
      <button class="btn btn-primary" id="copyShareUrl">Copy URL</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="curriculum/dsa.js"></script>
<script src="curriculum/frontend.js"></script>
<script src="curriculum/backend.js"></script>
<script src="curriculum/lld.js"></script>
<script src="curriculum/systemDesign.js"></script>
<script src="curriculum/index.js"></script>
<script src="app.js"></script>
</body>
</html>
