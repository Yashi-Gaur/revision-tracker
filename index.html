<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Yashi Gaur's SWE Revision Tracker — DSA, Frontend, Backend, System Design">
<title>Yashi's SWE Revision Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   THEME TOKENS
   ============================================================ */
:root {
  --bg: #f8fafc;
  --bg-elevated: #ffffff;
  --bg-subtle: #f1f5f9;
  --text: #0f172a;
  --text-muted: #64748b;
  --text-subtle: #94a3b8;
  --border: #e2e8f0;
  --border-strong: #cbd5e1;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --accent-subtle: #eef2ff;
  --success: #10b981;
  --success-subtle: #d1fae5;
  --warning: #f59e0b;
  --warning-subtle: #fef3c7;
  --danger: #ef4444;
  --danger-subtle: #fee2e2;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
  --shadow-lg: 0 8px 32px rgba(15, 23, 42, 0.08);

  /* Section accent colors */
  --dsa: #6366f1;       --dsa-bg: #eef2ff;
  --frontend: #ec4899;  --frontend-bg: #fce7f3;
  --backend: #10b981;   --backend-bg: #d1fae5;
  --lld: #14b8a6;       --lld-bg: #ccfbf1;
  --systemDesign: #f59e0b; --systemDesign-bg: #fef3c7;
}
[data-theme="dark"] {
  --bg: #0a0f1c;
  --bg-elevated: #131a2c;
  --bg-subtle: #1e2638;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --text-subtle: #64748b;
  --border: #1e2638;
  --border-strong: #334155;
  --accent: #818cf8;
  --accent-hover: #a5b4fc;
  --accent-subtle: #1e1b4b;
  --success-subtle: #064e3b;
  --warning-subtle: #78350f;
  --danger-subtle: #7f1d1d;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);

  --dsa-bg: #1e1b4b;
  --frontend-bg: #500724;
  --backend-bg: #064e3b;
  --lld-bg: #134e4a;
  --systemDesign-bg: #78350f;
}

/* ============================================================
   HEADER
   ============================================================ */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  backdrop-filter: blur(12px);
  background: color-mix(in srgb, var(--bg-elevated) 90%, transparent);
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header h1 span.viewing-badge {
  font-size: 11px;
  font-weight: 600;
  background: var(--warning-subtle);
  color: var(--warning);
  padding: 4px 8px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border: 1px solid var(--border-strong);
  background: var(--bg-elevated);
  color: var(--text);
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: inherit;
}
.btn:hover { background: var(--bg-subtle); border-color: var(--accent); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: white; }
.btn-icon { padding: 8px; aspect-ratio: 1; }

/* Sync indicator */
.sync-indicator {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 8px;
  font-weight: 500;
  background: var(--bg-subtle);
  color: var(--text-muted);
  border: 1px solid var(--border);
}
.sync-indicator.syncing { background: var(--accent-subtle); color: var(--accent); border-color: var(--accent); }
.sync-indicator.synced { background: var(--success-subtle); color: var(--success); border-color: var(--success); }
.sync-indicator.error, .sync-indicator.offline { background: var(--danger-subtle); color: var(--danger); border-color: var(--danger); }
.sync-indicator .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
}
.sync-indicator.syncing .dot { animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity: 0.3; } }

/* ============================================================
   LAYOUT
   ============================================================ */
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Overall progress */
.overall-card {
  background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
  color: white;
  padding: 28px;
  border-radius: 16px;
  margin-bottom: 32px;
  box-shadow: var(--shadow-lg);
}
.overall-card h2 { font-size: 14px; font-weight: 500; opacity: 0.9; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.overall-stats { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.overall-stats .big { font-size: 42px; font-weight: 800; letter-spacing: -0.03em; }
.overall-stats .sub { font-size: 15px; opacity: 0.9; }

.progress-bar {
  height: 10px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.progress-bar.thin { height: 6px; }
.progress-fill {
  height: 100%;
  background: white;
  border-radius: 999px;
  transition: width 0.4s ease;
}
.section-card .progress-fill { background: var(--section-color, var(--accent)); }

/* Sections */
.section {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 24px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.section-header {
  padding: 20px 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 16px;
  user-select: none;
  transition: background 0.15s;
}
.section-header:hover { background: var(--bg-subtle); }
.section-icon {
  width: 44px; height: 44px;
  background: var(--section-bg);
  color: var(--section-color);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.section-title { flex: 1; min-width: 0; }
.section-title h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
.section-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.section-progress-wrapper { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 200px; }
.section-progress-text { font-size: 13px; color: var(--text-muted); font-weight: 500; min-width: 80px; text-align: right; }
.section .chevron { transition: transform 0.25s ease; color: var(--text-muted); }
.section[data-collapsed="false"] .chevron { transform: rotate(180deg); }

.section-body {
  padding: 0 24px 24px 24px;
  border-top: 1px solid var(--border);
}
.section[data-collapsed="true"] .section-body { display: none; }

/* Topic cards */
.topic {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-top: 16px;
  overflow: hidden;
}
.topic-header {
  padding: 14px 18px;
  cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  user-select: none;
  transition: background 0.15s;
}
.topic-header:hover { background: var(--bg-subtle); }
.topic-emoji { font-size: 18px; }
.topic-name {
  font-size: 15px;
  font-weight: 600;
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}
.priority-badge {
  font-size: 10px;
  padding: 3px 7px;
  border-radius: 5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.priority-high { background: var(--danger-subtle); color: var(--danger); }
.priority-medium { background: var(--warning-subtle); color: var(--warning); }
.priority-low { background: var(--success-subtle); color: var(--success); }

.topic-progress {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}
.topic-progress .pct {
  min-width: 36px;
  text-align: right;
}
.topic-mini-bar {
  width: 60px;
  height: 6px;
  background: var(--bg-subtle);
  border-radius: 999px;
  overflow: hidden;
}
.topic-mini-bar > div {
  height: 100%;
  background: var(--section-color);
  transition: width 0.3s;
}

.topic-body { padding: 0 18px 14px 18px; display: none; }
.topic[data-collapsed="false"] .topic-body { display: block; }

/* Subtopic */
.subtopic {
  padding: 14px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-top: 10px;
}
.subtopic.done {
  background: var(--success-subtle);
  border-color: var(--success);
}
.subtopic-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.subtopic-checkbox {
  appearance: none;
  width: 20px; height: 20px;
  border: 2px solid var(--border-strong);
  border-radius: 6px;
  cursor: pointer;
  display: grid; place-items: center;
  background: var(--bg-elevated);
  transition: all 0.15s;
  flex-shrink: 0;
}
.subtopic-checkbox:hover { border-color: var(--accent); }
.subtopic-checkbox:checked {
  background: var(--success);
  border-color: var(--success);
}
.subtopic-checkbox:checked::after {
  content: '';
  width: 6px; height: 10px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  margin-top: -2px;
}
.subtopic-name {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
  min-width: 0;
}
.subtopic.done .subtopic-name {
  text-decoration: line-through;
  opacity: 0.7;
}

.date-controls {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
}
.date-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px;
  padding: 4px 8px;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 6px;
}
.date-pill label {
  color: var(--text-muted);
  font-weight: 500;
  white-space: nowrap;
}
.date-pill input {
  font-family: inherit;
  font-size: 12px;
  padding: 2px 4px;
  border: none;
  border-radius: 4px;
  background: transparent;
  color: var(--text);
  color-scheme: light dark;
  cursor: pointer;
  min-width: 110px;
}
.date-pill input:hover { background: var(--bg-elevated); }
.date-pill.overdue {
  background: var(--danger-subtle);
  border-color: var(--danger);
}
.date-pill.overdue input,
.date-pill.overdue label { color: var(--danger); font-weight: 600; }
.date-pill.due-soon {
  background: var(--warning-subtle);
  border-color: var(--warning);
}
.date-pill.due-soon input,
.date-pill.due-soon label { color: var(--warning); font-weight: 600; }
.date-pill.done-color {
  background: var(--success-subtle);
  border-color: var(--success);
}
.date-pill.done-color label { color: var(--success); }
.btn-clear-date {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 11px;
  color: var(--text-subtle);
  padding: 0 2px;
  line-height: 1;
}
.btn-clear-date:hover { color: var(--danger); }

.problem-links {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 6px;
}
.problem-link {
  font-size: 12px;
  padding: 5px 10px;
  background: var(--bg-subtle);
  color: var(--text);
  text-decoration: none;
  border-radius: 6px;
  border: 1px solid var(--border);
  transition: all 0.15s;
  white-space: nowrap;
}
.problem-link:hover {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  transform: translateY(-1px);
}

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: none;
  align-items: center; justify-content: center;
  z-index: 200;
  padding: 16px;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--bg-elevated);
  border-radius: 16px;
  max-width: 540px;
  width: 100%;
  padding: 28px;
  box-shadow: var(--shadow-lg);
}
.modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.modal p { color: var(--text-muted); margin-bottom: 16px; font-size: 14px; }
.modal-share-url {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  background: var(--bg-subtle);
  font-family: 'SF Mono', Monaco, monospace;
  font-size: 12px;
  color: var(--text);
  word-break: break-all;
  resize: none;
  min-height: 80px;
  margin-bottom: 12px;
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(120%);
  background: var(--text);
  color: var(--bg);
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  z-index: 300;
  transition: transform 0.3s ease;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Responsive */
@media (max-width: 640px) {
  .container { padding: 16px; }
  .header { padding: 12px 16px; }
  .header h1 { font-size: 16px; }
  .btn { padding: 7px 10px; font-size: 12px; }
  .overall-card { padding: 20px; }
  .overall-stats .big { font-size: 32px; }
  .section-header { padding: 16px; }
  .section-icon { width: 36px; height: 36px; font-size: 18px; }
  .section-title h2 { font-size: 18px; }
  .section-body { padding: 0 16px 16px 16px; }
  .topic-mini-bar { display: none; }
  .topic-progress .pct { display: none; }
  .subtopic-head { flex-direction: column; align-items: flex-start; }
  .revision-date { width: 100%; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <h1>📚 Yashi's Revision Tracker <span class="viewing-badge" id="viewingBadge" style="display:none">Viewing Snapshot</span></h1>
    <div class="header-actions">
      <span class="sync-indicator" id="syncIndicator"><span class="dot"></span><span id="syncText">Loading…</span></span>
      <button class="btn btn-icon" id="themeBtn" title="Toggle theme">🌙</button>
      <button class="btn" id="shareBtn" title="Share progress with friends">🔗 Share</button>
      <button class="btn" id="resetBtn" title="Reset all progress">↺ Reset</button>
    </div>
  </div>
</header>

<main class="container">
  <div class="overall-card">
    <h2>Overall Progress</h2>
    <div class="overall-stats">
      <div class="big" id="overallPct">0%</div>
      <div class="sub" id="overallText">0 of 0 subtopics complete</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="overallBar" style="width:0%"></div>
    </div>
  </div>

  <div id="sections"></div>
</main>

<div class="modal-backdrop" id="shareModal">
  <div class="modal">
    <h3>🔗 Share your progress</h3>
    <p>Copy this URL and send it to your friends. They'll see your current progress as a read-only snapshot.</p>
    <textarea class="modal-share-url" id="shareUrl" readonly></textarea>
    <div class="modal-actions">
      <button class="btn" id="closeShareModal">Close</button>
      <button class="btn btn-primary" id="copyShareUrl">Copy URL</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================================
// CURRICULUM DATA (embedded)
// ============================================================================
const CURRICULUM = {

const JSONBIN_BIN_ID = '6a0cab446610dd3ae87035ea';
const JSONBIN_ACCESS_KEY = '$2a$10$SucCjUWz7GIQK5pCC03pROGVeRGkTdg0bsUZRB30lA63SoqB3la66';
const JSONBIN_API = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

const STORAGE_KEY = 'yashi-revision-tracker-v1';
const THEME_KEY = 'yashi-tracker-theme';
let state = {};
let isViewingSnapshot = false;
let isViewerMode = false;
let lastLocalEdit = 0;
let saveTimer = null;

function setSyncStatus(status, customText) {
  const el = document.getElementById('syncIndicator');
  const textEl = document.getElementById('syncText');
  if (!el) return;
  el.classList.remove('syncing', 'synced', 'error', 'offline');
  const labels = {
    syncing: 'Syncing…',
    synced: 'Synced',
    error: 'Sync error',
    offline: 'Offline',
    loading: 'Loading…',
  };
  if (status !== 'loading') el.classList.add(status);
  textEl.textContent = customText || labels[status] || status;
}

async function loadStateFromCloud() {
  try {
    setSyncStatus('syncing', 'Loading…');
    const r = await fetch(JSONBIN_API + '/latest', {
      headers: { 'X-Access-Key': JSONBIN_ACCESS_KEY },
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    state = (data.record && data.record.state) || {};
    setSyncStatus('synced');
    return true;
  } catch (e) {
    console.warn('Cloud load failed:', e);
    setSyncStatus('offline');
    return false;
  }
}

function loadStateFromLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch (e) { console.warn(e); }
}

function loadFromHashShare() {
  const hash = window.location.hash;
  if (!hash.startsWith('#share=')) return false;
  try {
    const encoded = hash.slice(7);
    state = JSON.parse(decodeURIComponent(atob(encoded)));
    isViewingSnapshot = true;
    document.getElementById('viewingBadge').style.display = '';
    document.getElementById('resetBtn').style.display = 'none';
    setSyncStatus('synced', 'Snapshot');
    showToast('Viewing shared snapshot');
    return true;
  } catch (e) {
    console.warn('Invalid share URL', e);
    return false;
  }
}

function saveState() {
  if (isViewingSnapshot || isViewerMode) return;
  lastLocalEdit = Date.now();
  // Always save to localStorage immediately (offline fallback)
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.warn('Local save failed:', e); }
  // Debounced cloud save
  setSyncStatus('syncing');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveStateToCloud, 700);
}

async function saveStateToCloud() {
  try {
    const r = await fetch(JSONBIN_API, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Access-Key': JSONBIN_ACCESS_KEY,
      },
      body: JSON.stringify({ state, lastUpdated: new Date().toISOString() }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    setSyncStatus('synced');
  } catch (e) {
    console.warn('Cloud save failed:', e);
    setSyncStatus('error');
  }
}

function getSubtopicState(sectionKey, topicIdx, subIdx) {
  return state?.[sectionKey]?.[topicIdx]?.[subIdx] || { done: false, targetDate: null, revisionDate: null };
}

function setSubtopicState(sectionKey, topicIdx, subIdx, update) {
  if (!state[sectionKey]) state[sectionKey] = {};
  if (!state[sectionKey][topicIdx]) state[sectionKey][topicIdx] = {};
  if (!state[sectionKey][topicIdx][subIdx]) state[sectionKey][topicIdx][subIdx] = { done: false, targetDate: null, revisionDate: null };
  Object.assign(state[sectionKey][topicIdx][subIdx], update);
  saveState();
}

// Spaced repetition: when marked done, default next revision = +3 days
function defaultRevisionDate() {
  const d = new Date();
  d.setDate(d.getDate() + 3);
  return d.toISOString().split('T')[0];
}

// Capture/restore expand/collapse UI state across full re-renders
function captureUiState() {
  const ui = { closedSections: [], openTopics: [] };
  document.querySelectorAll('.section[data-collapsed="true"]').forEach(el => {
    ui.closedSections.push(el.dataset.section);
  });
  document.querySelectorAll('.topic[data-collapsed="false"]').forEach(el => {
    ui.openTopics.push(`${el.dataset.section}:${el.dataset.topic}`);
  });
  return ui;
}
function restoreUiState(snap) {
  if (!snap) return;
  document.querySelectorAll('.section').forEach(el => {
    if (snap.closedSections.includes(el.dataset.section)) el.dataset.collapsed = 'true';
  });
  document.querySelectorAll('.topic').forEach(el => {
    if (snap.openTopics.includes(`${el.dataset.section}:${el.dataset.topic}`)) {
      el.dataset.collapsed = 'false';
    }
  });
}

// ============================================================================
// RENDERING
// ============================================================================
function calcSectionProgress(sectionKey) {
  const section = CURRICULUM[sectionKey];
  let done = 0, total = 0;
  section.topics.forEach((topic, ti) => {
    topic.subtopics.forEach((_, si) => {
      total++;
      if (getSubtopicState(sectionKey, ti, si).done) done++;
    });
  });
  return { done, total, pct: total ? Math.round((done / total) * 100) : 0 };
}

function calcTopicProgress(sectionKey, topicIdx) {
  const topic = CURRICULUM[sectionKey].topics[topicIdx];
  let done = 0;
  topic.subtopics.forEach((_, si) => {
    if (getSubtopicState(sectionKey, topicIdx, si).done) done++;
  });
  return { done, total: topic.subtopics.length, pct: topic.subtopics.length ? Math.round((done / topic.subtopics.length) * 100) : 0 };
}

function renderOverall() {
  let done = 0, total = 0;
  Object.keys(CURRICULUM).forEach(k => {
    const p = calcSectionProgress(k);
    done += p.done; total += p.total;
  });
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('overallPct').textContent = pct + '%';
  document.getElementById('overallText').textContent = `${done} of ${total} subtopics complete`;
  document.getElementById('overallBar').style.width = pct + '%';
}

function dateStatus(dateStr, ignoreDoneCheck) {
  // ignoreDoneCheck: when called for target dates from a NOT-done subtopic,
  // pass false (default behavior). The previous gated-on-done logic only made
  // sense for revision dates; we now call this independently with the right flag.
  if (!dateStr) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr); target.setHours(0,0,0,0);
  const days = Math.round((target - today) / (1000*60*60*24));
  if (days < 0) return 'overdue';
  if (days <= 2) return 'due-soon';
  return '';
}

function renderAll() {
  const container = document.getElementById('sections');
  container.innerHTML = '';

  Object.keys(CURRICULUM).forEach(sectionKey => {
    const section = CURRICULUM[sectionKey];
    const prog = calcSectionProgress(sectionKey);

    const sectionEl = document.createElement('div');
    sectionEl.className = 'section';
    sectionEl.dataset.collapsed = 'false';
    sectionEl.dataset.section = sectionKey;
    sectionEl.style.setProperty('--section-color', `var(--${sectionKey})`);
    sectionEl.style.setProperty('--section-bg', `var(--${sectionKey}-bg)`);

    sectionEl.innerHTML = `
      <div class="section-header">
        <div class="section-icon">${section.icon}</div>
        <div class="section-title">
          <h2>${section.label}</h2>
          <div class="section-meta">
            <div class="section-progress-wrapper">
              <div class="progress-bar thin" style="flex:1">
                <div class="progress-fill" style="width:${prog.pct}%"></div>
              </div>
              <div class="section-progress-text">${prog.done}/${prog.total} · ${prog.pct}%</div>
            </div>
          </div>
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="section-body"></div>
    `;

    sectionEl.querySelector('.section-header').addEventListener('click', () => {
      sectionEl.dataset.collapsed = sectionEl.dataset.collapsed === 'true' ? 'false' : 'true';
    });

    const body = sectionEl.querySelector('.section-body');
    section.topics.forEach((topic, ti) => body.appendChild(renderTopic(sectionKey, ti)));
    container.appendChild(sectionEl);
  });

  renderOverall();
}

function renderTopic(sectionKey, ti) {
  const topic = CURRICULUM[sectionKey].topics[ti];
  const prog = calcTopicProgress(sectionKey, ti);

  const el = document.createElement('div');
  el.className = 'topic';
  el.dataset.collapsed = 'true';
  el.dataset.section = sectionKey;
  el.dataset.topic = ti;
  el.innerHTML = `
    <div class="topic-header">
      <span class="topic-emoji">${topic.emoji}</span>
      <div class="topic-name">
        ${topic.name}
        <span class="priority-badge priority-${topic.priority}">${topic.priority}</span>
      </div>
      <div class="topic-progress">
        <div class="topic-mini-bar"><div style="width:${prog.pct}%"></div></div>
        <span class="pct">${prog.done}/${prog.total}</span>
      </div>
      <span class="chevron">▾</span>
    </div>
    <div class="topic-body"></div>
  `;
  el.querySelector('.topic-header').addEventListener('click', (e) => {
    // Don't toggle if clicking inside a subtopic or any input/button
    if (e.target.closest('.subtopic, input, button, a, label')) return;
    el.dataset.collapsed = el.dataset.collapsed === 'true' ? 'false' : 'true';
  });

  const body = el.querySelector('.topic-body');
  topic.subtopics.forEach((sub, si) => body.appendChild(renderSubtopic(sectionKey, ti, si)));
  return el;
}

function renderSubtopic(sectionKey, ti, si) {
  const sub = CURRICULUM[sectionKey].topics[ti].subtopics[si];
  const st = getSubtopicState(sectionKey, ti, si);

  const targetStatus = !st.done ? dateStatus(st.targetDate) : 'done-color';
  const reviseStatus = dateStatus(st.revisionDate);

  const el = document.createElement('div');
  el.className = 'subtopic' + (st.done ? ' done' : '');
  el.dataset.section = sectionKey;
  el.dataset.topic = ti;
  el.dataset.sub = si;
  el.innerHTML = `
    <div class="subtopic-head">
      <input type="checkbox" class="subtopic-checkbox" ${st.done ? 'checked' : ''} ${isViewingSnapshot ? 'disabled' : ''}>
      <div class="subtopic-name">${sub.name}</div>
      <div class="date-controls">
        <div class="date-pill target-pill ${targetStatus}">
          <label>🎯 Target:</label>
          <input type="date" class="target-date-input" value="${st.targetDate || ''}" ${isViewingSnapshot ? 'disabled' : ''}>
          <button class="btn-clear-date" title="Clear target date" style="${st.targetDate && !isViewingSnapshot ? '' : 'display:none'}">✕</button>
        </div>
        <div class="date-pill revise-pill ${reviseStatus}" style="${st.done ? '' : 'display:none'}">
          <label>🔁 Revise:</label>
          <input type="date" class="revise-date-input" value="${st.revisionDate || ''}" ${isViewingSnapshot ? 'disabled' : ''}>
        </div>
      </div>
    </div>
    <div class="problem-links">
      ${sub.problems.map(p => `<a class="problem-link" href="${p.url}" target="_blank" rel="noopener">${p.name} ↗</a>`).join('')}
    </div>
  `;

  const checkbox = el.querySelector('.subtopic-checkbox');
  const targetInput = el.querySelector('.target-date-input');
  const reviseInput = el.querySelector('.revise-date-input');
  const clearBtn = el.querySelector('.btn-clear-date');

  checkbox.addEventListener('change', () => {
    const done = checkbox.checked;
    const cur = getSubtopicState(sectionKey, ti, si);
    const updates = { done };
    if (done && !cur.revisionDate) updates.revisionDate = defaultRevisionDate();
    setSubtopicState(sectionKey, ti, si, updates);
    // Targeted updates only — don't rebuild DOM
    updateSubtopicVisuals(sectionKey, ti, si);
    updateTopicProgress(sectionKey, ti);
    updateSectionProgress(sectionKey);
    renderOverall();
  });

  targetInput.addEventListener('change', () => {
    setSubtopicState(sectionKey, ti, si, { targetDate: targetInput.value || null });
    updateSubtopicVisuals(sectionKey, ti, si);
  });

  reviseInput.addEventListener('change', () => {
    setSubtopicState(sectionKey, ti, si, { revisionDate: reviseInput.value || null });
    updateSubtopicVisuals(sectionKey, ti, si);
  });

  clearBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    setSubtopicState(sectionKey, ti, si, { targetDate: null });
    updateSubtopicVisuals(sectionKey, ti, si);
  });

  return el;
}

// ============================================================================
// TARGETED IN-PLACE UPDATES — keeps expand/collapse state intact
// ============================================================================
function updateSubtopicVisuals(sectionKey, ti, si) {
  const el = document.querySelector(
    `.subtopic[data-section="${sectionKey}"][data-topic="${ti}"][data-sub="${si}"]`
  );
  if (!el) return;
  const st = getSubtopicState(sectionKey, ti, si);

  // Done styling
  el.classList.toggle('done', !!st.done);
  el.querySelector('.subtopic-checkbox').checked = !!st.done;

  // Target pill: color class + clear button visibility + input value
  const targetPill = el.querySelector('.target-pill');
  const targetStatus = !st.done ? dateStatus(st.targetDate) : 'done-color';
  targetPill.className = 'date-pill target-pill ' + targetStatus;
  const targetInput = el.querySelector('.target-date-input');
  if (targetInput.value !== (st.targetDate || '')) targetInput.value = st.targetDate || '';
  const clearBtn = el.querySelector('.btn-clear-date');
  clearBtn.style.display = (st.targetDate && !isViewingSnapshot) ? '' : 'none';

  // Revise pill: visibility + color + input value
  const revisePill = el.querySelector('.revise-pill');
  revisePill.style.display = st.done ? '' : 'none';
  revisePill.className = 'date-pill revise-pill ' + dateStatus(st.revisionDate);
  const reviseInput = el.querySelector('.revise-date-input');
  if (reviseInput.value !== (st.revisionDate || '')) reviseInput.value = st.revisionDate || '';
}

function updateTopicProgress(sectionKey, ti) {
  const prog = calcTopicProgress(sectionKey, ti);
  const el = document.querySelector(`.topic[data-section="${sectionKey}"][data-topic="${ti}"]`);
  if (!el) return;
  const bar = el.querySelector('.topic-mini-bar > div');
  const pct = el.querySelector('.topic-progress .pct');
  if (bar) bar.style.width = prog.pct + '%';
  if (pct) pct.textContent = `${prog.done}/${prog.total}`;
}

function updateSectionProgress(sectionKey) {
  const prog = calcSectionProgress(sectionKey);
  const el = document.querySelector(`.section[data-section="${sectionKey}"]`);
  if (!el) return;
  const fill = el.querySelector('.progress-fill');
  const text = el.querySelector('.section-progress-text');
  if (fill) fill.style.width = prog.pct + '%';
  if (text) text.textContent = `${prog.done}/${prog.total} · ${prog.pct}%`;
}

// ============================================================================
// SHARE FEATURE
// ============================================================================
function generateShareUrl() {
  const encoded = btoa(encodeURIComponent(JSON.stringify(state)));
  const baseUrl = window.location.href.split('#')[0];
  return baseUrl + '#share=' + encoded;
}

document.getElementById('shareBtn').addEventListener('click', () => {
  const url = generateShareUrl();
  document.getElementById('shareUrl').value = url;
  document.getElementById('shareModal').classList.add('open');
});
document.getElementById('closeShareModal').addEventListener('click', () => {
  document.getElementById('shareModal').classList.remove('open');
});
document.getElementById('copyShareUrl').addEventListener('click', async () => {
  const url = document.getElementById('shareUrl').value;
  try {
    await navigator.clipboard.writeText(url);
    showToast('Share URL copied to clipboard ✨');
  } catch (e) {
    document.getElementById('shareUrl').select();
    showToast('Select-all done — press Ctrl+C to copy');
  }
});
document.getElementById('shareModal').addEventListener('click', (e) => {
  if (e.target.id === 'shareModal') document.getElementById('shareModal').classList.remove('open');
});

// ============================================================================
// RESET
// ============================================================================
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset ALL progress? This cannot be undone.')) {
    state = {};
    saveState();
    renderAll();
    showToast('Progress reset.');
  }
});

// ============================================================================
// THEME
// ============================================================================
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
  try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
}
document.getElementById('themeBtn').addEventListener('click', () => {
  const cur = document.documentElement.dataset.theme || 'light';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
});

function initTheme() {
  let theme = 'light';
  try { theme = localStorage.getItem(THEME_KEY) || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); } catch (e) {}
  applyTheme(theme);
}

// ============================================================================
// TOAST
// ============================================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ============================================================================
// INIT (async — load cloud, optional viewer mode polling)
// ============================================================================
async function init() {
  initTheme();

  // Viewer mode (?view=1) — read-only, polls cloud
  const params = new URLSearchParams(location.search);
  if (params.get('view') === '1') {
    isViewerMode = true;
    document.getElementById('viewingBadge').style.display = '';
    document.getElementById('viewingBadge').textContent = 'Live View';
    document.getElementById('resetBtn').style.display = 'none';
    showToast('Live view — auto-refreshes every 15s');
  }

  // Hash share takes precedence (frozen snapshot, no cloud)
  if (loadFromHashShare()) {
    renderAll();
    return;
  }

  // Fast path: render from localStorage first to avoid blank flash
  loadStateFromLocal();
  renderAll();

  // Then refresh from cloud
  const cloudOk = await loadStateFromCloud();
  if (cloudOk) {
    const ui = captureUiState();
    renderAll();
    restoreUiState(ui);
  }

  // Refresh on tab focus (only if no recent local edit)
  document.addEventListener('visibilitychange', async () => {
    if (document.hidden) return;
    if (isViewingSnapshot) return;
    if (Date.now() - lastLocalEdit < 3000) return; // skip if we just edited
    const before = JSON.stringify(state);
    await loadStateFromCloud();
    if (JSON.stringify(state) !== before) {
      const ui = captureUiState();
      renderAll();
      restoreUiState(ui);
    }
  });

  // Live polling for viewer mode
  if (isViewerMode) {
    setInterval(async () => {
      const before = JSON.stringify(state);
      await loadStateFromCloud();
      if (JSON.stringify(state) !== before) {
        const ui = captureUiState();
        renderAll();
        restoreUiState(ui);
      }
    }, 15000);
  }
}

init();
</script>
